# Railway deployment configuration for SiteGrade
# Two services: api (Hono HTTP server) and worker (BullMQ processor)
# Deploy both from the same monorepo root

[build]
builder = "NIXPACKS"
buildCommand = "pnpm install --frozen-lockfile && pnpm turbo build --filter=api --filter=worker"

# ─── API Service ────────────────────────────────────────────────────────────────
# Set SERVICE_NAME=api in Railway environment to use this config
[deploy]
startCommand = "node apps/api/dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[services]]
name = "api"
source = "."
buildCommand = "pnpm install --frozen-lockfile && pnpm turbo build --filter=api"
startCommand = "node apps/api/dist/index.js"

[services.deploy]
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[services.variables]
PORT = "3001"
NODE_ENV = "production"

# ─── Worker Service ──────────────────────────────────────────────────────────────
[[services]]
name = "worker"
source = "."
buildCommand = "pnpm install --frozen-lockfile && pnpm turbo build --filter=worker"
startCommand = "node apps/worker/dist/index.js"

[services.deploy]
# No healthcheck for worker — it's a queue consumer, not an HTTP server
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

[services.variables]
NODE_ENV = "production"
WORKER_CONCURRENCY = "3"
